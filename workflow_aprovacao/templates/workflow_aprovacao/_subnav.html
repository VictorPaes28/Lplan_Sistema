<div class="wf-subnav-bar">
    <nav class="wf-nav" aria-label="Central de Aprovações">
        <a href="{% url 'workflow_aprovacao:home' %}"
           class="{% if request.resolver_match.url_name == 'dashboard' or request.resolver_match.url_name == 'home' %}wf-nav--active{% endif %}">
            <i class="fas fa-chart-pie" aria-hidden="true"></i> Visão geral
        </a>
        <a href="{% url 'workflow_aprovacao:pending' %}"
           class="{% if request.resolver_match.url_name == 'pending' %}wf-nav--active{% endif %}">
            <i class="fas fa-inbox" aria-hidden="true"></i> Fila
            {% if workflow_pending_count and request.resolver_match.url_name != 'pending' %}
            <span class="wf-nav-badge" title="Pendências na sua fila">{{ workflow_pending_count }}</span>
            {% endif %}
        </a>
        {% if workflow_show_config_nav %}
        <a href="{% url 'workflow_aprovacao:config_flow_list' %}"
           class="{% if request.resolver_match.url_name == 'config_flow_list' or request.resolver_match.url_name == 'flow_edit' %}wf-nav--active{% endif %}">
            <i class="fas fa-sitemap" aria-hidden="true"></i> Fluxos
        </a>
        {% endif %}
    </nav>
</div>
