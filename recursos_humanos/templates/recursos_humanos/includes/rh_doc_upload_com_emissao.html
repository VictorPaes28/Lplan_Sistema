<form method="post" enctype="multipart/form-data" action="{{ upload_url }}" class="rh-doc-upload-form rh-doc-upload-panel">
  {% csrf_token %}
  {% if id_prefix == "adm" %}
  <input type="hidden" name="next" value="{% url 'recursos_humanos:admissao' %}?id={{ admissao_id }}&ver_etapa=2">
  {% else %}
  <input type="hidden" name="next" value="{{ next_url }}">
  {% endif %}
  <div class="rh-doc-upload-panel__inner">
    <div class="rh-doc-upload-panel__step">
      <span class="rh-doc-upload-panel__step-num" aria-hidden="true">1</span>
      <div class="rh-doc-upload-panel__field">
        <label for="rh-doc-emissao-{{ id_prefix }}-{{ doc_pk }}">Data de emissão</label>
        <input type="date" name="data_emissao" id="rh-doc-emissao-{{ id_prefix }}-{{ doc_pk }}" class="rh-input rh-doc-upload-panel__date" required>
        <span class="rh-doc-upload-panel__hint">Informe quando o documento foi emitido — o vencimento será calculado automaticamente.</span>
      </div>
    </div>
    <div class="rh-doc-upload-panel__step">
      <span class="rh-doc-upload-panel__step-num" aria-hidden="true">2</span>
      <div class="rh-doc-upload-panel__field">
        <span class="rh-doc-upload-panel__sublabel" id="rh-doc-file-label-{{ id_prefix }}-{{ doc_pk }}">Anexar arquivo</span>
        <div class="rh-doc-upload-panel__actions">
          <div class="rh-doc-file-picker">
            <input type="file" name="arquivo" id="rh-doc-file-{{ id_prefix }}-{{ doc_pk }}" class="rh-doc-file-input rh-doc-file-input--hidden" required aria-labelledby="rh-doc-file-label-{{ id_prefix }}-{{ doc_pk }}">
            <label for="rh-doc-file-{{ id_prefix }}-{{ doc_pk }}" class="rh-btn rh-btn-upload rh-btn-upload--pick">
              <i class="fas fa-paperclip" aria-hidden="true"></i> Escolher arquivo
            </label>
          </div>
          <button type="submit" class="rh-btn rh-btn-primary rh-btn-upload-submit">
            <i class="fas fa-paper-plane" aria-hidden="true"></i> Enviar
          </button>
        </div>
        <span class="rh-doc-filename rh-doc-upload-panel__filename" data-filename-for="rh-doc-file-{{ id_prefix }}-{{ doc_pk }}" hidden></span>
      </div>
    </div>
  </div>
</form>
