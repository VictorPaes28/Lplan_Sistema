<form method="post" enctype="multipart/form-data" action="{{ upload_url }}" class="rh-doc-upload-form rh-doc-upload-panel js-rh-doc-ajax-upload">
  {% csrf_token %}
  {% if id_prefix == "adm" %}
  <input type="hidden" name="next" value="{% url 'recursos_humanos:admissao' %}?id={{ admissao_id }}&ver_etapa=2">
  {% else %}
  <input type="hidden" name="next" value="{{ next_url }}">
  {% endif %}
  <div class="rh-doc-upload-panel__form">
    <div class="rh-doc-upload-panel__field">
      <label for="rh-doc-emissao-{{ id_prefix }}-{{ doc_pk }}">Data de emissão</label>
      <input type="date" name="data_emissao" id="rh-doc-emissao-{{ id_prefix }}-{{ doc_pk }}" class="rh-input rh-doc-upload-panel__date" required>
    </div>
    <div class="rh-doc-upload-panel__field rh-doc-upload-panel__field--file">
      <span class="rh-doc-upload-panel__field-label" id="rh-doc-file-label-{{ id_prefix }}-{{ doc_pk }}">Arquivo</span>
      <div class="rh-doc-upload-panel__filezone">
        <input type="file" name="arquivo" id="rh-doc-file-{{ id_prefix }}-{{ doc_pk }}" class="rh-doc-file-input rh-doc-file-input--hidden" required aria-labelledby="rh-doc-file-label-{{ id_prefix }}-{{ doc_pk }}">
        <label for="rh-doc-file-{{ id_prefix }}-{{ doc_pk }}" class="rh-btn rh-btn-upload" data-role="picker">
          <i class="fas fa-upload" aria-hidden="true"></i> Upload
        </label>
        <div class="rh-doc-upload-panel__chip" data-role="selected" hidden>
          <i class="fas fa-file" data-role="chip-icon" aria-hidden="true"></i>
          <span class="rh-doc-upload-panel__chip-name" data-role="chip-name"></span>
          <span class="rh-doc-upload-panel__chip-size" data-role="chip-size"></span>
          <button type="button" class="rh-doc-upload-panel__chip-clear" data-role="clear" aria-label="Remover arquivo selecionado">
            <i class="fas fa-times" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  <p class="rh-doc-upload-panel__hint">Informe a data de emissão e anexe o arquivo — o vencimento será calculado automaticamente.</p>
</form>
