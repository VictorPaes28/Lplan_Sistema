{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link inválido — Lplan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'recursos_humanos/css/portal.css' %}">
</head>
<body class="portal-body">
  <div class="portal-wrap">
    <header class="portal-header">
      <div class="portal-logo">Lplan</div>
    </header>
    <div class="portal-state-card">
      <div class="portal-state-icon" aria-hidden="true">🔗</div>
      <h1>Link não é mais válido</h1>
      <p>Este endereço foi substituído ou não existe. Verifique o <strong>e-mail ou WhatsApp mais recente</strong> do RH — sempre use o último link enviado.</p>
      <p class="portal-state-hint">Se não encontrar, peça um novo link ao RH da sua admissão.</p>
    </div>
  </div>
</body>
</html>
