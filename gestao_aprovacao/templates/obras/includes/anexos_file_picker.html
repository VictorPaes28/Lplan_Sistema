<label for="anexos" class="form-label">
    {{ picker_label }}
    {% if picker_required %}<span class="form-required">*</span>{% endif %}
    {% if picker_hint %}<span style="color: #6c757d; font-weight: 400; text-transform: none; letter-spacing: 0;">{{ picker_hint }}</span>{% endif %}
</label>
<div class="wo-anexos-picker">
    <div class="upload-dropzone-wrapper">
        <div class="upload-dropzone" id="wo-anexos-dropzone" tabindex="0" role="button" aria-label="Selecionar arquivos">
            <svg class="upload-dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p class="upload-dropzone-text">Clique ou arraste arquivos aqui</p>
            <p class="upload-dropzone-hint">PDF, DOC, DOCX, XLS, XLSX, JPG, PNG, GIF, ZIP, RAR, 7Z · máx. 50 MB cada</p>
            <input type="file" id="anexos" name="anexos" class="wo-anexos-input"
                   accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.zip,.rar,.7z" multiple
                   {% if picker_required %}required{% endif %}>
        </div>
    </div>
    <div class="upload-queue" id="wo-anexos-queue" hidden>
        <div class="upload-queue-header">
            <h3 class="upload-queue-title">Selecionados para envio</h3>
            <button type="button" class="upload-queue-clear" id="wo-anexos-queue-clear">Limpar tudo</button>
        </div>
        <ul class="upload-file-list upload-file-list--pending" id="wo-anexos-queue-list"></ul>
    </div>
</div>
{% if picker_help %}
<div class="form-help">{{ picker_help|safe }}</div>
{% endif %}
