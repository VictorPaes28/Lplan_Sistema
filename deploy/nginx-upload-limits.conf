# Snippet para incluir no bloco `server { }` do nginx em produção (ajuste paths e teste: nginx -t).
#
# Limite de corpo: deve ser >= DATA_UPLOAD_MAX_MB no Django (.env) e ao mesmo tempo refletir
# capacidade real do servidor (uploads grandes aumentam risco de DoS — combine com rate limit no host).
#
# Segurança sugerida no mesmo bloco server (valores exemplificativos; depende do tráfego):
#   limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/s;
#   limit_req zone=upload burst=20 nodelay;
#   limit_conn_zone $binary_remote_addr zone=perip:10m;
#   limit_conn perip 20;

client_max_body_size 200m;
client_body_timeout 120s;

# 413 antes do Django: resposta JSON com código (logs da app não verão este caso)
error_page 413 @lplan_entity_too_large;
location @lplan_entity_too_large {
    default_type application/json;
    return 413 '{"success":false,"code":"NGINX_REQUEST_ENTITY_TOO_LARGE","message":"O envio excede o limite do proxy (nginx). Reduza anexos ou peça ao administrador para aumentar client_max_body_size."}';
}
